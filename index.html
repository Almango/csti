<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTI人格测试</title>
    <link rel="preconnect" href="https://pl29156693.profitablecpmratenetwork.com" crossorigin>
    <link rel="dns-prefetch" href="https://pl29156693.profitablecpmratenetwork.com">
    <link rel="stylesheet" href="assets/main.css">
</head>

<body>
    <!-- 欢迎弹窗 -->
    <div class="modal" id="welcomeModal">
        <div class="modal-content">
            <h2>快来测出你的CSGO人格！</h2>
            <p class="modal-ops">OPS：您可在页脚关闭广告</p>
            <button class="modal-btn" onclick="closeModal()">开始测试</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>CSTI人格测试</h1>
            <p class="subtitle">完成所有题项，测出你的CSGO游戏人格</p>
        </header>

        <div class="quiz" id="quiz">
            <div class="progress-text">已完成 <span id="answered">0</span> / 28 题</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div id="questions"></div>

            <button class="submit-btn" id="submit" onclick="showResult()" disabled>查看结果</button>
        </div>

        <div class="result" id="result">
            <h2 class="result-type" id="result-type"></h2>
            <p class="result-match" id="result-match"></p>
            <div class="result-image" id="result-image"></div>

            <div class="result-desc">
                <h3>人格解读</h3>
                <p id="result-desc"></p>
            </div>

            <div class="dimensions">
                <h3>七维人格评分</h3>
                <div id="dimensions"></div>
            </div>

            <button class="restart-btn" onclick="restart()">重新测试</button>
        </div>

        <footer class="footer">
            <div class="ad-toggle">
                <span class="ad-toggle-text">广告</span>
                <label class="switch">
                    <input type="checkbox" id="adSwitch" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <p>本站内容仅供娱乐，部分资源来源于第三方</p>
        </footer>
    </div>
    <script>
        // 广告开关控制
        (function () {
            // 从localStorage读取广告设置，默认为开启
            var adEnabled = localStorage.getItem('adEnabled') !== 'false';
            
            // 设置开关状态
            var adSwitch = document.getElementById('adSwitch');
            if (adSwitch) {
                adSwitch.checked = adEnabled;
                
                // 监听开关变化
                adSwitch.addEventListener('change', function() {
                    localStorage.setItem('adEnabled', this.checked);
                    location.reload();
                });
            }
            
            // 如果广告开启，加载广告脚本
            if (adEnabled) {
                var script = document.createElement('script');
                script.src = 'https://pl29156693.profitablecpmratenetwork.com/3b/02/ca/3b02ca19caac0ac0fc61ee457d3671a1.js';
                script.async = true;
                script.fetchPriority = 'high';
                document.head.appendChild(script);
            }
        })();
    </script>
